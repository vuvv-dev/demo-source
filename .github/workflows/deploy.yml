name: Deploy to VPS

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -euo pipefail
            DEPLOY_DIR="/srv/docimal-demo"
            REGISTRY="${{ env.REGISTRY }}"
            IMAGE_NAME="${{ env.IMAGE_NAME }}"
            SHA="${{ github.sha }}"
            DOMAIN="demo.docimal.site"
            SSL_EMAIL="${{ secrets.SSL_EMAIL }}"
            FRONTEND_PORT=6073
            BACKEND_PORT=6074
            NGINX_HTTP=8073
            NGINX_HTTPS=8074

            echo "==> Deploying demo-source (SHA: $SHA)"
            echo "==> Domain: $DOMAIN"

            # ── 1. Prepare directories ──────────────────────────────────────────
            mkdir -p "$DEPLOY_DIR"
            mkdir -p "$DEPLOY_DIR/nginx"
            mkdir -p /var/www/certbot-demo

            # ── 2. Write env files ──────────────────────────────────────────────
            cat > "$DEPLOY_DIR/.env.frontend" << 'ENVFRONT'
            ${{ secrets.FRONTEND_ENV }}
            ENVFRONT

            cat > "$DEPLOY_DIR/.env.backend" << 'ENVBACK'
            ${{ secrets.BACKEND_ENV }}
            ENVBACK
            echo "==> .env files written"

            # ── 3. Write docker-compose.prod.yml ─────────────────────────────────
            cat > "$DEPLOY_DIR/docker-compose.prod.yml" << COMPOSEEOF
            services:
              postgres:
                image: postgres:16-alpine
                container_name: apple-store-db-prod
                restart: unless-stopped
                environment:
                  POSTGRES_USER: \${POSTGRES_USER:-postgres}
                  POSTGRES_PASSWORD: \${POSTGRES_PASSWORD:-postgres123}
                  POSTGRES_DB: \${POSTGRES_DB:-apple_store}
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ['CMD-SHELL', 'pg_isready -U \${POSTGRES_USER:-postgres} -d \${POSTGRES_DB:-apple_store}']
                  interval: 10s
                  timeout: 5s
                  retries: 5
                networks:
                  - app-network

              backend:
                image: \${REGISTRY}/\${IMAGE_NAME}-backend:\${SHA}
                container_name: apple-store-api-prod
                restart: unless-stopped
                env_file:
                  - .env.backend
                environment:
                  PORT: 3001
                  NODE_ENV: production
                depends_on:
                  postgres:
                    condition: service_healthy
                networks:
                  - app-network

              frontend:
                image: \${REGISTRY}/\${IMAGE_NAME}-frontend:\${SHA}
                container_name: apple-store-frontend-prod
                restart: unless-stopped
                env_file:
                  - .env.frontend
                environment:
                  PORT: 3000
                  NODE_ENV: production
                depends_on:
                  - backend
                networks:
                  - app-network

              nginx:
                image: nginx:alpine
                container_name: apple-store-nginx
                restart: unless-stopped
                ports:
                  - '\${NGINX_HTTP:-8073}:80'
                  - '\${NGINX_HTTPS:-8074}:443'
                volumes:
                  - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
                  - /etc/letsencrypt/demo.docimal.site:/etc/letsencrypt/live/demo.docimal.site:ro
                networks:
                  - app-network

            volumes:
              postgres_data:

            networks:
              app-network:
                driver: bridge
            COMPOSEEOF
            echo "==> docker-compose.prod.yml written"

            # ── 4. SSL Certificate via certbot (standalone on port 8888) ─────────
            CERT_DIR="/etc/letsencrypt/live/$DOMAIN"
            NEEDS_CERT="false"

            if [ ! -f "$CERT_DIR/fullchain.pem" ]; then
              NEEDS_CERT="true"
              echo "==> No SSL cert found. Requesting new cert for $DOMAIN..."
            else
              EXPIRY=$(openssl x509 -enddate -noout -in "$CERT_DIR/fullchain.pem" 2>/dev/null | cut -d= -f2)
              EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s 2>/dev/null || date -jf "%b %d %T %Y %Z" "$EXPIRY" +%s 2>/dev/null)
              NOW_EPOCH=$(date +%s)
              DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))
              echo "==> SSL cert expires: $EXPIRY ($DAYS_LEFT days left)"
              if [ "$DAYS_LEFT" -le 30 ]; then
                NEEDS_CERT="true"
                echo "==> Cert expiring soon. Will renew..."
              fi
            fi

            if [ "$NEEDS_CERT" = "true" ]; then
              echo "==> Requesting SSL cert for $DOMAIN..."

              # Write standalone nginx for ACME challenge on port 8888
              cat > /tmp/nginx-acme.conf << ACMEEOF
            server {
                listen 8888;
                server_name _;
                location /.well-known/acme-challenge/ {
                    root /var/www/certbot-demo;
                }
            }
            ACMEEOF

              mkdir -p /var/www/certbot-demo

              # Start temp nginx for ACME
              docker rm -f demo-nginx-acme 2>/dev/null || true
              docker run -d \
                --name demo-nginx-acme \
                --restart unless-stopped \
                -p 8888:80 \
                -v /tmp/nginx-acme.conf:/etc/nginx/conf.d/default.conf:ro \
                -v /var/www/certbot-demo:/var/www/certbot-demo \
                nginx:alpine

              sleep 3

              # Request cert
              certbot certonly --standalone \
                --preferred-challenges http-01 \
                --http-01-port 8888 \
                -d "$DOMAIN" \
                --email "$SSL_EMAIL" \
                --agree-tos --non-interactive

              docker rm -f demo-nginx-acme 2>/dev/null || true
              echo "==> SSL cert obtained for $DOMAIN"
            else
              echo "==> SSL cert is valid. Skipping."
            fi

            # ── 5. Write nginx.conf with SSL ───────────────────────────────────
            cat > "$DEPLOY_DIR/nginx/nginx.conf" << NGINXEOF
            upstream demo_backend {
                server 127.0.0.1:${BACKEND_PORT:-6074};
                keepalive 32;
            }

            upstream demo_frontend {
                server 127.0.0.1:${FRONTEND_PORT:-6073};
                keepalive 32;
            }

            server {
                listen 80;
                server_name $DOMAIN;
                return 301 https://\$server_name\$request_uri;
            }

            server {
                listen 443 ssl http2;
                listen [::]:443 ssl http2;
                server_name $DOMAIN;
                server_tokens off;

                ssl_certificate /etc/letsencrypt/live/$DOMAIN/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/$DOMAIN/privkey.pem;

                ssl_session_timeout 1d;
                ssl_session_cache shared:SSL:50m;
                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
                ssl_prefer_server_ciphers off;

                add_header Strict-Transport-Security "max-age=63072000" always;
                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header X-Content-Type-Options "nosniff" always;

                client_max_body_size 50M;
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;

                location /api/ {
                    proxy_pass http://demo_backend/api/;
                    proxy_http_version 1.1;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }

                location / {
                    proxy_pass http://demo_frontend;
                    proxy_http_version 1.1;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
            NGINXEOF
            echo "==> nginx.conf written with SSL"

            # ── 6. Login to registry ────────────────────────────────────────────
            echo ${{ secrets.GITHUB_TOKEN }} | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

            # ── 7. Deploy containers ────────────────────────────────────────────
            export REGISTRY IMAGE_NAME SHA NGINX_HTTP NGINX_HTTPS FRONTEND_PORT BACKEND_PORT
            cd "$DEPLOY_DIR"

            docker rm -f $(docker ps -aq --filter "name=apple-store" 2>/dev/null) 2>/dev/null || true

            docker compose -f docker-compose.prod.yml down 2>/dev/null || true
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo ""
            echo "==> Containers status:"
            docker ps --filter "name=apple-store" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo ""
            echo "==> Health check HTTPS:"
            curl -s -k -o /dev/null -w "%{http_code}" https://127.0.0.1:$NGINX_HTTPS/ || echo "FAILED"
            echo ""
            echo "==> Deployment complete!"
            echo "==> HTTPS: https://$DOMAIN:$NGINX_HTTPS"
            echo "==> API:   https://$DOMAIN:$NGINX_HTTPS/api"
