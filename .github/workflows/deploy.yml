name: Deploy to VPS

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  DOMAIN: demo.docimal.site
  WEBROOT: /var/www/certbot-demo
  NGINX_HTTP: "8073"
  NGINX_HTTPS: "8074"
  BACKEND_PORT: "6074"
  FRONTEND_PORT: "6073"
  DEPLOY_DIR: /srv/docimal-demo
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ── Build & Push Docker images ─────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: |
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT
        id: vars

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ─────────────────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy deploy files to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_SSH_PORT }}
          strip_components: 1
          source: deploy/*
          target: "${{ env.DEPLOY_DIR }}/"

      - name: Deploy & SSL on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_SSH_PORT }}
          timeout: 15m
          command_timeout: 15m
          script: |
            set -euo pipefail

            DOMAIN="${{ env.DOMAIN }}"
            WEBROOT="${{ env.WEBROOT }}"
            REGISTRY="${{ env.REGISTRY }}"
            IMAGE_NAME="${{ env.IMAGE_NAME }}"
            IMAGE_TAG="${{ needs.build-and-push.outputs.IMAGE_TAG }}"
            NGINX_HTTP="${{ env.NGINX_HTTP }}"
            NGINX_HTTPS="${{ env.NGINX_HTTPS }}"
            BACKEND_PORT="${{ env.BACKEND_PORT }}"
            FRONTEND_PORT="${{ env.FRONTEND_PORT }}"
            SSL_EMAIL="${{ secrets.SSL_EMAIL }}"
            DEPLOY_DIR="${{ env.DEPLOY_DIR }}"

            echo "=== Deploying: SHA=$IMAGE_TAG ==="

            mkdir -p "$DEPLOY_DIR" "$DEPLOY_DIR/nginx" "$WEBROOT"
            mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled

            # ── Env files ───────────────────────────────────────────
            printf '%s\n' "${{ secrets.FRONTEND_ENV }}" > "$DEPLOY_DIR/.env.frontend"
            printf '%s\n' "${{ secrets.BACKEND_ENV }}" > "$DEPLOY_DIR/.env.backend"
            chmod 600 "$DEPLOY_DIR/.env.frontend" "$DEPLOY_DIR/.env.backend"
            echo "Env files written."

            # ── Docker compose ───────────────────────────────────────
            REGISTRY="$REGISTRY" \
            IMAGE_NAME="$IMAGE_NAME" \
            IMAGE_TAG="$IMAGE_TAG" \
            DOMAIN="$DOMAIN" \
              envsubst '${REGISTRY} ${IMAGE_NAME} ${IMAGE_TAG} ${DOMAIN}' \
              < "$DEPLOY_DIR/docker-compose.prod.yml" \
              > "$DEPLOY_DIR/docker-compose.yml"
            echo "docker-compose.yml rendered."

            # ── Nginx SSL setup ──────────────────────────────────────
            NGINX_CONF="/etc/nginx/sites-available/$DOMAIN"
            NGINX_ENABLED="/etc/nginx/sites-enabled/$DOMAIN"

            # 1. Backup & symlink
            cp "$NGINX_CONF" "$NGINX_CONF.bak" 2>/dev/null || true
            if [ ! -L "$NGINX_ENABLED" ]; then
              ln -sf "$NGINX_CONF" "$NGINX_ENABLED"
            fi

            # 2. ACME-only config
            DOMAIN="$DOMAIN" WEBROOT="$WEBROOT" \
              envsubst '${DOMAIN} ${WEBROOT}' \
              > "$NGINX_CONF" << 'ACMEEOF'
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};
    location /.well-known/acme-challenge/ {
        root ${WEBROOT};
    }
    location / { return 503; }
}
ACMEEOF

            nginx -t && systemctl reload nginx || nginx -t && nginx -s reload
            sleep 3

            # 3. Certbot
            if certbot certonly --webroot -w "$WEBROOT" -d "$DOMAIN" \
               --email "$SSL_EMAIL" --agree-tos --non-interactive 2>&1 | grep -q "Certificate is saved"; then
              echo "SSL cert obtained."
            else
              echo "SSL cert may already exist or certbot ran."
            fi

            # 4. Full SSL config
            DOMAIN="$DOMAIN" WEBROOT="$WEBROOT" \
            BACKEND_PORT="$BACKEND_PORT" FRONTEND_PORT="$FRONTEND_PORT" \
              envsubst '${DOMAIN} ${WEBROOT} ${BACKEND_PORT} ${FRONTEND_PORT}' \
              > "$NGINX_CONF" << 'SSLEOF'
upstream demo_backend { server 127.0.0.1:${BACKEND_PORT}; keepalive 32; }
upstream demo_frontend { server 127.0.0.1:${FRONTEND_PORT}; keepalive 32; }

server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};
    location /.well-known/acme-challenge/ { root ${WEBROOT}; }
    location / { return 301 https://$server_name$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${DOMAIN};
    ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=63072000" always;
    client_max_body_size 50M;

    location /api/ {
        proxy_pass http://demo_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {
        proxy_pass http://demo_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
SSLEOF

            nginx -t && systemctl reload nginx || nginx -t && nginx -s reload
            echo "Nginx SSL config applied."

            # ── Docker ───────────────────────────────────────────────
            cd "$DEPLOY_DIR"
            docker login "$REGISTRY" -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
            docker compose down 2>/dev/null || true
            docker compose up -d --remove-orphans
            echo "Containers started."
            docker ps --filter "name=demo-"

            echo ""
            echo "=== Done ==="
            echo "Frontend: https://$DOMAIN"
            echo "API:      https://$DOMAIN/api"
