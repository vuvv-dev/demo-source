name: Deploy to VPS

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            DEPLOY_DIR="/srv/docimal-demo"
            REGISTRY="${{ env.REGISTRY }}"
            IMAGE_NAME="${{ env.IMAGE_NAME }}"
            SHA="${{ github.sha }}"
            FRONTEND_PORT=6073
            BACKEND_PORT=6074
            NGINX_PUBLIC_PORT=8073

            echo "==> Deploying demo-source (SHA: $SHA)"

            # ── 1. Write env files ──────────────────────────────────────────────
            mkdir -p "$DEPLOY_DIR"
            cat > "$DEPLOY_DIR/.env.frontend" << 'ENVFRONT'
            ${{ secrets.FRONTEND_ENV }}
            ENVFRONT

            cat > "$DEPLOY_DIR/.env.backend" << 'ENVBACK'
            ${{ secrets.BACKEND_ENV }}
            ENVBACK
            echo "==> .env files written"

            # ── 2. Write docker-compose.prod.yml ─────────────────────────────────
            cat > "$DEPLOY_DIR/docker-compose.prod.yml" << COMPOSEEOF
            services:
              postgres:
                image: postgres:16-alpine
                container_name: apple-store-db-prod
                restart: unless-stopped
                environment:
                  POSTGRES_USER: \${POSTGRES_USER:-postgres}
                  POSTGRES_PASSWORD: \${POSTGRES_PASSWORD:-postgres123}
                  POSTGRES_DB: \${POSTGRES_DB:-apple_store}
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ['CMD-SHELL', 'pg_isready -U \${POSTGRES_USER:-postgres} -d \${POSTGRES_DB:-apple_store}']
                  interval: 10s
                  timeout: 5s
                  retries: 5
                networks:
                  - app-network

              backend:
                image: ${REGISTRY}/\${IMAGE_NAME}-backend:\${SHA}
                container_name: apple-store-api-prod
                restart: unless-stopped
                env_file:
                  - .env.backend
                environment:
                  PORT: 3001
                  NODE_ENV: production
                depends_on:
                  postgres:
                    condition: service_healthy
                networks:
                  - app-network

              frontend:
                image: ${REGISTRY}/\${IMAGE_NAME}-frontend:\${SHA}
                container_name: apple-store-frontend-prod
                restart: unless-stopped
                env_file:
                  - .env.frontend
                environment:
                  PORT: 3000
                  NODE_ENV: production
                depends_on:
                  - backend
                networks:
                  - app-network

              nginx:
                image: nginx:alpine
                container_name: apple-store-nginx
                restart: unless-stopped
                ports:
                  - '\${NGINX_PUBLIC_PORT:-8073}:80'
                networks:
                  - app-network

            volumes:
              postgres_data:

            networks:
              app-network:
                driver: bridge
            COMPOSEEOF
            echo "==> docker-compose.prod.yml written"

            # ── 3. Write nginx.conf ─────────────────────────────────────────────
            mkdir -p "$DEPLOY_DIR/nginx"
            cat > "$DEPLOY_DIR/nginx/nginx.conf" << 'NGINXEOF'
            upstream backend {
                server 127.0.0.1:${BACKEND_PORT:-6074};
                keepalive 32;
            }

            upstream frontend {
                server 127.0.0.1:${FRONTEND_PORT:-6073};
                keepalive 32;
            }

            server {
                listen 80;
                server_name _;
                server_tokens off;

                client_max_body_size 50M;
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;

                location /api/ {
                    proxy_pass http://backend/api/;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }

                location / {
                    proxy_pass http://frontend;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
            }
            NGINXEOF
            echo "==> nginx.conf written"

            # ── 4. Login to registry ────────────────────────────────────────────
            echo ${{ secrets.GITHUB_TOKEN }} | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

            # ── 5. Deploy ──────────────────────────────────────────────────────
            export REGISTRY IMAGE_NAME SHA NGINX_PUBLIC_PORT FRONTEND_PORT BACKEND_PORT
            cd "$DEPLOY_DIR"

            # Remove ALL containers with "apple-store" prefix to avoid conflicts
            docker rm -f $(docker ps -aq --filter "name=apple-store" 2>/dev/null) 2>/dev/null || true
            # Also remove any orphan nginx containers that may exist from previous failed runs
            docker rm -f $(docker ps -aq --filter "ancestor=nginx:alpine" --filter "name=apple-store-nginx" 2>/dev/null) 2>/dev/null || true

            docker compose -f docker-compose.prod.yml down 2>/dev/null || true
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo ""
            echo "==> Containers status:"
            docker ps --filter "name=apple-store" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo ""
            echo "==> Deployment complete!"
            echo "==> Frontend (HTTP): http://${{ secrets.VPS_HOST }}:$NGINX_PUBLIC_PORT"
            echo "==> API (HTTP):     http://${{ secrets.VPS_HOST }}:$NGINX_PUBLIC_PORT/api"
            echo ""
            echo "==> SSL: docimal-client nginx proxy https://demo.docimal.site → http://${{ secrets.VPS_HOST }}:$NGINX_PUBLIC_PORT"
