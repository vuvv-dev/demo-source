name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  # Change to your repository name (lowercase)
  # Eg: github.repository is 'username/repo-name'
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      - name: Extract metadata (tags, labels) for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

  deploy:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Copy docker-compose and nginx config via scp
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }} # Optional, depending on your key
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          source: "docker-compose.prod.yml,nginx/nginx.conf"
          target: "/srv/docimal-demo"
          
      - name: Execute deployment on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }} # Optional
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          script: |
            # Create network if not exists
            docker network create app-network || true
            
            # Change directory to where scp copied
            cd /srv/docimal-demo
            
            # Login to GitHub Container Registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Export environment variables for docker-compose
            export REGISTRY=ghcr.io
            export IMAGE_NAME=${{ github.repository }}
            
            # We rewrite docker-compose.prod.yml using awk/sed or we just set env vars.
            # Notice our docker-compose.prod.yml uses ${REGISTRY:-ghcr.io/yourusername}/docimal-backend:latest
            # So we will sed update it instead of relying on env vars if needed, 
            # but env vars are fine if we run it from script
            
            # Replace placeholder tags in docker-compose.prod.yml
            sed -i "s|\${REGISTRY:-ghcr.io/yourusername}/docimal-backend:latest|${REGISTRY}/${IMAGE_NAME}-backend:main|g" docker-compose.prod.yml
            sed -i "s|\${REGISTRY:-ghcr.io/yourusername}/docimal-frontend:latest|${REGISTRY}/${IMAGE_NAME}-frontend:main|g" docker-compose.prod.yml
            
            # Pull latest images
            docker-compose -f docker-compose.prod.yml pull
            
            # Restart services
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans
            
            # Cleanup old unused images
            docker image prune -a -f
