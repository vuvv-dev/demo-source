services:
  postgres:
    image: postgres:16-alpine
    container_name: apple-store-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-apple_store}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-apple_store}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    image: ${REGISTRY:-ghcr.io/yourusername}/docimal-backend:latest
    container_name: apple-store-api-prod
    restart: unless-stopped
    env_file:
      - .env.backend
    environment:
      PORT: 3001
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    image: ${REGISTRY:-ghcr.io/yourusername}/docimal-frontend:latest
    container_name: apple-store-frontend-prod
    restart: unless-stopped
    env_file:
      - .env.frontend
    environment:
      NODE_ENV: production
      PORT: 3000
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: apple-store-nginx
    restart: unless-stopped
    ports:
      - '${NGINX_PUBLIC_PORT:-8073}:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
