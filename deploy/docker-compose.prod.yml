# ================================================================
# docimal-demo — Production Docker Compose
# ================================================================

services:
  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: demo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-apple_store}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-apple_store}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  # ── Backend (NestJS) ────────────────────────────────────────────
  backend:
    image: ${REGISTRY}/${IMAGE_NAME}-backend:${IMAGE_TAG}
    container_name: demo-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-6074}:3001"
    env_file:
      - .env.backend
    environment:
      PORT: 3001
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network

  # ── Frontend (Next.js) ──────────────────────────────────────────
  frontend:
    image: ${REGISTRY}/${IMAGE_NAME}-frontend:${IMAGE_TAG}
    container_name: demo-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-6073}:3000"
    env_file:
      - .env.frontend
    environment:
      PORT: 3000
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
